model_name = "meta-llama/Llama-3.2-3B"
svd_rank = 64

# Step2 covariance calibration dataset (HF datasets name)
calibration_dataset = "DKYoon/SlimPajama-6B"
calibration_n_samples = 128

# Step3 PPL dataset: wiki | c4 | ptb
ppl_dataset = "wiki"

# If true, run src/step3_lm_eval.py with lm-eval-harness enabled.
# If false, run src/step3_eval_dataset.py.
lm_harness = false

# Optional runtime settings
device = "cuda:0"
group_size = 128
use_cuda_w4a16 = true
trust_remote_code = false
calibration_seq_len = 2048
output_dir = "outputs/llama_3_2_3b"

# GlowQ-S restoration pipeline (run_glowq_s.py)
# Set true when using the restoration pipeline config flow.
glowq_s = false
# Step3_1 importance metrics (comma-separated). Default uses GSVD + normalized error.
# Available: gsvd, norm_error, frobenius_norm_error, cosine_similarity, layer_order
# Aliases: norm, normalized, fro, cosine, layer
importance_metric = "gsvd,norm_error"

# Optional step3 settings
skip_gen = false
eval_seq_len = 2048

# Optional harness settings (used when lm_harness = true)
harness_tasks = "arc_easy,piqa,boolq"
harness_batch_size = 1
harness_num_fewshot = 0
